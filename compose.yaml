services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BALANCE_PORTAL_DB_URL: jdbc:mariadb://mariadb:3306/balance_portal
      BALANCE_PORTAL_DB_USER: root
      BALANCE_PORTAL_DB_PASSWORD: rootpassword
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: balance_portal
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
