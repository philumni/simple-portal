substitutions:
  _REGION: europe-west1
  _AR_REPO: my-app-images
  _SERVICE_NAME: app-service
  _JOB_NAME: db-initializer-job
  _DB_HOST: CHANGE_ME_CLOUD_SQL_PUBLIC_IP
  _DB_NAME: app-db
  _INSTANCE_CONNECTION_NAME: project-051d6e24-390d-450c-aa4:europe-west1:app-db
  _JOB_DB_USER_SECRET: db-initializer-username
  _JOB_DB_PASSWORD_SECRET: db-initializer-password
  _APP_DB_USER_SECRET: app-db-username
  _APP_DB_PASSWORD_SECRET: app-db-password

steps:
  - id: Build DB init image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - cloud/db-init/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/db-initializer-job:${SHORT_SHA}
      - .

  - id: Push DB init image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/db-initializer-job:${SHORT_SHA}

  - id: Deploy DB init job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/db-initializer-job:${SHORT_SHA}
      - --region=${_REGION}
      - --set-env-vars=DB_HOST=${_DB_HOST},DB_NAME=${_DB_NAME}
      - --set-secrets=DB_USER=${_JOB_DB_USER_SECRET}:latest,DB_PASSWORD=${_JOB_DB_PASSWORD_SECRET}:latest

  - id: Execute DB init job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - ${_JOB_NAME}
      - --region=${_REGION}
      - --wait

  - id: Build app image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-service:${SHORT_SHA}
      - .

  - id: Push app image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-service:${SHORT_SHA}

  - id: Deploy app service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-service:${SHORT_SHA}
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-env-vars=BALANCE_PORTAL_INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},BALANCE_PORTAL_DB_NAME=${_DB_NAME},BALANCE_PORTAL_DB_IP_TYPES=PUBLIC
      - --set-secrets=BALANCE_PORTAL_DB_USER=${_APP_DB_USER_SECRET}:latest,BALANCE_PORTAL_DB_PASSWORD=${_APP_DB_PASSWORD_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/db-initializer-job:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app-service:${SHORT_SHA}
