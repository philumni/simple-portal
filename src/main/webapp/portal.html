<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal | Northwind Balance Portal</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="portal">
  <main class="shell shell--portal">
    <header class="portal-header">
      <div>
        <p class="eyebrow">Balance portal</p>
        <h1 id="portal-name">Loading account...</h1>
        <p id="portal-email" class="lede lede--compact"></p>
      </div>
      <button id="logout-button" class="button button--ghost" type="button">Sign out</button>
    </header>

    <section class="summary-grid">
      <article class="summary-card">
        <span>Balance owed</span>
        <strong id="balance-owed">$0.00</strong>
      </article>
      <article class="summary-card">
        <span>Total charges</span>
        <strong id="total-charges">$0.00</strong>
      </article>
      <article class="summary-card">
        <span>Total payments</span>
        <strong id="total-payments">$0.00</strong>
      </article>
    </section>

    <section class="ledger">
      <div class="ledger-head">
        <h2>Transaction history</h2>
        <p>Entries are loaded with AJAX from the servlet JSON endpoints.</p>
      </div>

      <p id="portal-message" class="form-message" aria-live="polite"></p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Type</th>
              <th class="amount-col">Amount</th>
            </tr>
          </thead>
          <tbody id="transactions-body">
            <tr>
              <td colspan="4">Loading transactions...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
