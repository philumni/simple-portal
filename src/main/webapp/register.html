<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Northwind Balance Portal</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="register">
  <main class="shell shell--form">
    <section class="card">
      <a class="back-link" href="index.html">Back</a>
      <p class="eyebrow">New customer</p>
      <h1>Create an account and see a sample ledger.</h1>

      <form id="register-form" class="form-stack">
        <label>
          <span>Full name</span>
          <input type="text" name="fullName" autocomplete="name" required>
        </label>

        <label>
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>

        <label>
          <span>Password</span>
          <input type="password" name="password" autocomplete="new-password" minlength="8" required>
        </label>

        <button class="button button--primary" type="submit">Create account</button>
        <p id="register-message" class="form-message" aria-live="polite"></p>
      </form>

      <p class="footnote">
        Already registered? <a href="login.html">Sign in here</a>.
      </p>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
