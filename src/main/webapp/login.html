<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Northwind Balance Portal</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="login">
  <main class="shell shell--form">
    <section class="card">
      <a class="back-link" href="index.html">Back</a>
      <p class="eyebrow">Customer access</p>
      <h1>Sign in to review your balance.</h1>

      <form id="login-form" class="form-stack">
        <label>
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>

        <label>
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>

        <button class="button button--primary" type="submit">Sign in</button>
        <p id="login-message" class="form-message" aria-live="polite"></p>
      </form>

      <p class="footnote">
        Need an account? <a href="register.html">Register here</a>.
      </p>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
